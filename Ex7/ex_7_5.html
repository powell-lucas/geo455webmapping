<!DOCTYPE html>
<html>
<head>
    <title>Ex-7-5: UI</title>

    <script src="https://code.jquery.com/jquery-4.0.0.min.js"
            integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao="
            crossorigin="anonymous"></script>

    <script src="https://code.jquery.com/ui/1.14.2/jquery-ui.min.js"></script> <!-- make sure jQuery UI library js file version and css version are compatible and matches -->
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.14.2/themes/ui-lightness/jquery-ui.css">

    <style>
        #tin {
            float: left;
            width: 200px;
            height: 200px;
            cursor: move;
        }

        #moon {
            float: right;
            width: 300px;
            height: 300px;
            border: 4px solid transparent;
        }

        #message {
            clear: both;
            padding-top: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <script>
        $(function () {
            $("#tin").draggable();

            $("#moon").droppable({
                drop: function () {
                    $(this).css("border", "4px yellow solid");
                    $("#message").text("Success! Tintin reached the moon.");
                }
            });
        });
    </script>

    <h1>Tintin goes to moon</h1>

    <div>
        <img id="tin" src="img/tintin-milou.jpg" alt="Tintin">
        <img id="moon" src="img/moon.jpg" alt="Moon">
    </div>

    <p id="message">Drag Tintin onto the moon.</p>


</body>
</html>
