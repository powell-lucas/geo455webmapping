<html>
   <head>
      <title>Ex-7-2: CSS manipulation</title>

    </head>
      <script 
        src="https://code.jquery.com/jquery-4.0.0.min.js" 
        integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" 
        crossorigin="anonymous">
      </script>

        
    <style>
           .charac {
               float: left;
           }
           img {
              width: 200px; 
               height: 200px; 
           }
           .styleclass {
               border: 5px solid cadetblue;
           }
      </style>
      
      <script>
          $(document).ready(function() {
              $("#button-1").click(function(){
                  $("img").addClass("styleclass"); //try change to toggleClass
                            // Add removeClass()
              });
              $("#button-2").click(function(){
                  $("img").toggleClass("styleclass");
              });
          });
      </script>

	
   <body>
       <h1> Adventures of Tintin </h1>
       <p> Main Characters </p>
        <!-- start with charac class -->
       <div class= "charac"> 
           <img src="img/tintin-milou.jpg">
           <img src="img/captain-haddock_v2.jpg">
           <img src="img/prof_calcu.jpg">
           <img src="img/Thomson_&_Thompson.png">
       </div>

              <!-- add button for add class to change to styleClass --> 
       <button id="button-1">Try addClass()</button>
              <!-- add button for remove class -->
       <button id="button-2">Try toggleClass()</button>

       <!-- add button for toggle class -->
   </body>
</html>
