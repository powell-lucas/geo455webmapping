<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lab 8: Dane County Commuter Flow Map</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!--  My CSS -->
  <link rel="stylesheet" href="geo455_lab8.css" />

</head>

<body>

  <!-- Map Container -->
  <div id="map"></div>

  <!-- Description Box -->
  <div id="description">
    <h3>Lab 8: Dane County Commuter Flow</h3>
    <p>This thematic map shows the number of workers commuting 
    into Dane County, WI from nearby counties just outside of Dane. 
    Line width and color are formatted to represent commuter volume.</p>
  </div>

  <!-- Control Buttons -->
  <div id="controls">
    <button class="btn" onclick="commuteLayer.hide()">Hide</button>
    <button class="btn" onclick="commuteLayer.show()">Show</button>
    <button class="btn" onclick="commuteLayer.pause()">Pause</button>
    <button class="btn" onclick="commuteLayer.play()">Play</button>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Migration Layer Plugin -->
  <script src="https://cdn.jsdelivr.net/gh/lit-forest/leaflet.migrationLayer/src/src.js"></script>

  <!-- My Dane Data File -->
  <script src="lab8_data/dane_commute_data.js"></script>

  <!-- My JS -->
  <script src="map_lab9.js"></script>

</body>
</html>
