<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEO 455: Ex 8 WebAPIs</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            color: #222;
        }

        header {
            background: #1f3b5c;
            color: white;
            padding: 20px;
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-size: 32px;
        }

        .wrapper {
            max-width: 1600px;
            margin: 20px auto;
            padding: 0 20px 30px 20px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .exercise-box {
            background: white;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        .exercise-box h2 {
            margin: 0;
            padding: 15px 20px;
            background: #e9eef3;
            border-bottom: 1px solid #ccc;
            font-size: 20px;
            min-height: 60px;
        }

        iframe {
            display: block;
            width: 100%;
            height: 600px;
            border: none;
        }

        @media (max-width: 1200px) {
            .grid-container {
                grid-template-columns: 1fr;
            }

            iframe {
                height: 500px;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>GEO 455: Ex 8 - Showing the use of OGC APIs</h1>
    </header>

    <div class="wrapper">
        <div class="grid-container">
            <div class="exercise-box">
                <h2>Exercise 1: Current Weather for One Location</h2>
                <iframe src="ex-8-1.html" title="Exercise 1"></iframe>
            </div>

            <div class="exercise-box">
                <h2>Exercise 2: Air Quality Map for Multiple Cities</h2>
                <iframe src="ex-8-2.html" title="Exercise 2"></iframe>
            </div>

            <div class="exercise-box">
                <h2>Exercise 3: USGS OGC API Streamflow Map</h2>
                <iframe src="ex-8-3.html" title="Exercise 3"></iframe>
            </div>
        </div>
    </div>
</body>
</html>
